version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16
  - React 19
  - Tailwind CSS 4
  - shadcn/ui (Radix UI)
  - Drizzle ORM
  - SQLite
  - Better Auth
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: true
    description: Dashboard with KPI cards and recent activity
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: User login page with email and password
  - path: /signup
    file: src/app/signup/page.tsx
    auth_required: false
    description: User registration page
  - path: /products
    file: src/app/products/page.tsx
    auth_required: true
    description: Product catalog with CRUD operations
  - path: /movements
    file: src/app/movements/page.tsx
    auth_required: true
    description: Stock movement registration and log
  - path: /locations
    file: src/app/locations/page.tsx
    auth_required: true
    description: Warehouse location management
  - path: /audit
    file: src/app/audit/page.tsx
    auth_required: true
    description: Audit trail with SKU search and timeline
  - path: /api/auth/[...all]
    file: src/app/api/auth/[...all]/route.ts
    auth_required: false
    description: Better Auth API handler
  - path: /api/products
    file: src/app/api/products/route.ts
    auth_required: true
    description: Product CRUD API
  - path: /api/movements
    file: src/app/api/movements/route.ts
    auth_required: true
    description: Movement registration API
  - path: /api/locations
    file: src/app/api/locations/route.ts
    auth_required: true
    description: Location management API
  - path: /api/dashboard
    file: src/app/api/dashboard/route.ts
    auth_required: true
    description: Dashboard KPI aggregation API
  - path: /api/audit
    file: src/app/api/audit/route.ts
    auth_required: true
    description: Audit trail query API
features:
  - name: User Registration
    description: Register a new account with name, email and password
    files:
      - src/app/signup/page.tsx
      - src/lib/auth-client.ts
    entry_route: /signup
    user_interactions:
      - Fill name input field
      - Fill email input field
      - Fill password input field
      - Click Sign Up button to submit
      - See error message on invalid input
      - Redirect to dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-up/email
    auth_required: false
  - name: User Login
    description: Login with email and password credentials
    files:
      - src/app/login/page.tsx
      - src/lib/auth-client.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Sign In button to submit
      - See error message on invalid credentials
      - Redirect to dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-in/email
    auth_required: false
  - name: Dashboard
    description: View KPI cards showing total stock, low stock items, daily movements, active locations, and recent activity feed
    files:
      - src/app/page.tsx
      - src/components/kpi-card.tsx
      - src/app/api/dashboard/route.ts
    entry_route: /
    user_interactions:
      - View total stock count KPI card
      - View low stock items KPI card
      - View daily movements KPI card
      - View active locations KPI card
      - View recent activity list
      - Click quick action buttons (Register Sale, Receive Stock, Transfer Stock)
    api_calls:
      - method: GET
        endpoint: /api/dashboard
    auth_required: true
  - name: Product Management
    description: Full CRUD for products with SKU, name, description, category, and min threshold
    files:
      - src/app/products/page.tsx
      - src/app/api/products/route.ts
    entry_route: /products
    user_interactions:
      - View product list in table
      - Search products by SKU or name
      - Filter products by status (All, In Stock, Low Stock, Out of Stock)
      - Click Add Product button to open dialog
      - Fill SKU input field
      - Fill product name input field
      - Fill description input field
      - Select category
      - Set minimum threshold
      - Click submit to create product
      - View product status indicators
    api_calls:
      - method: GET
        endpoint: /api/products
      - method: POST
        endpoint: /api/products
    auth_required: true
  - name: Stock Movement Registration
    description: Register stock movements including inbound, outbound, transfer, and adjustment types
    files:
      - src/app/movements/page.tsx
      - src/components/movement-badge.tsx
      - src/app/api/movements/route.ts
    entry_route: /movements
    user_interactions:
      - View movement log in table
      - Filter movements by type
      - Click Register Movement button to open dialog
      - Select product from dropdown
      - Select movement type (Inbound, Outbound, Transfer, Adjustment)
      - Enter quantity
      - Select from location
      - Select to location
      - Enter optional note
      - Click submit to register movement
    api_calls:
      - method: GET
        endpoint: /api/movements
      - method: POST
        endpoint: /api/movements
    auth_required: true
  - name: Location Management
    description: Manage warehouse locations including zones, shelves, bins, docks, and floors
    files:
      - src/app/locations/page.tsx
      - src/app/api/locations/route.ts
    entry_route: /locations
    user_interactions:
      - View locations list in table
      - Click Add Location button to open dialog
      - Fill location name input field
      - Fill zone input field
      - Select location type (shelf, bin, dock, floor)
      - Set capacity
      - Click submit to create location
    api_calls:
      - method: GET
        endpoint: /api/locations
      - method: POST
        endpoint: /api/locations
    auth_required: true
  - name: Audit Trail
    description: Search and view complete audit trail for products by SKU with timeline visualization
    files:
      - src/app/audit/page.tsx
      - src/components/timeline.tsx
      - src/app/api/audit/route.ts
    entry_route: /audit
    user_interactions:
      - Enter SKU in search input field
      - Click Search button or press Enter
      - View product info card with SKU and name
      - View timeline of all transactions
      - See transaction details including timestamp, action type, quantity, location path, and notes
    api_calls:
      - method: GET
        endpoint: /api/audit?sku={sku}
    auth_required: true
  - name: Navigation
    description: Sidebar navigation with links to all main pages and user session management
    files:
      - src/components/layout/sidebar.tsx
      - src/components/layout/top-nav.tsx
      - src/components/app-shell.tsx
    entry_route: /
    user_interactions:
      - Click sidebar links to navigate between pages
      - Toggle mobile sidebar menu
      - View current user info
      - Click sign out button
    api_calls: []
    auth_required: true
known_limitations: []
